<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Streamyfin Receiver</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Quicksand');

        /* Hide everything until ready */
        body {
          visibility: hidden;
          background: #000;
        }

        body.ready {
          visibility: visible;
          animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>

    <div id="idle-screen" class="visible">
      <div id="backdrop-a" class="backdrop active"></div>
      <div id="backdrop-b" class="backdrop"></div>
      <div id="idle-overlay">
        <img id="idle-logo" src="./icon-android-plain.png" alt="Streamyfin" />
        <p id="idle-message">Ready for casting</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
